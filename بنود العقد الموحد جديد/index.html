/* ================================================================

// ─── i18n Translations ───────────────────────────────────────────
const TR = {
  ar: {
    'nav.dashboard': 'لوحة التحكم',
    'nav.boq': 'منشئ المقايسات',
    'nav.emergency_boq': 'منشئ مقايسات الطوارئ (SAP 190%)',

    'nlbl.main': 'الرئيسية',
    'nlbl.tools': 'أدوات المقايسة',
    'nlbl.ref': 'المرجع والبحث',
    'nlbl.support': 'التواصل',
    'btn.newBOQ': 'مقايسة جديدة',
    'page.dashboard': 'لوحة التحكم',
    'page.boq': 'منشئ المقايسات',
    'page.emergency_boq': 'منشئ مقايسات الطوارئ (SAP 190%)',
    'page.analyzer': 'منشئ المعاملات',
    'page.pdf': 'التحليل بالذكاء الاصطناعي',
    'page.compare': 'مقارنة المقايسات',
    'page.certificate': 'إنشاء مستخلص',
    'page.search': 'البحث عن البنود',
    'page.pricelist': 'قائمة الأسعار الكاملة',
    'page.saved': 'المقايسات المحفوظة',
    'page.support': 'الدعم الفني والتواصل',
    'sfooter': 'الأسعار الموحدة النهائية\nمدينة الرياض • ضريبة 15%',
    'brand.tagline': 'النظام الذكي للتسعير والمقايسات • RFx 4000083770',
    'sec.name': 'الشركة السعودية للكهرباء',
    'asas.name': 'شركة الأساس العريض',
  },
  en: {
    'nav.dashboard': 'Dashboard',
    'nav.boq': 'BOQ Builder',
    'nav.emergency_boq': 'Emergency BOQ Builder (SAP 190%)',
    'nav.analyzer': 'Transaction Builder',
    'nav.pdf': 'AI Analysis',
    'nav.compare': 'Compare BOQs',
    'nav.certificate': 'Payment Certificate',
    'nav.search': 'Search Items',
    'nav.pricelist': 'Full Price List',
    'nav.saved': 'Saved BOQs',
    'nav.support': 'Technical Support',
    'nlbl.main': 'Main',
    'nlbl.tools': 'BOQ Tools',
    'nlbl.ref': 'Reference',
    'nlbl.support': 'Contact',
    'btn.newBOQ': 'New BOQ',
    'page.dashboard': 'Dashboard',
    'page.boq': 'BOQ Builder',
    'page.emergency_boq': 'Emergency BOQ Builder (SAP 190%)',
    'page.analyzer': 'Transaction Builder',
    'page.pdf': 'AI Analysis',
    'page.compare': 'Compare BOQs',
    'page.certificate': 'Payment Certificate',
    'page.search': 'Search Items',
    'page.pricelist': 'Full Price List',
    'page.saved': 'Saved BOQs',
    'page.support': 'Technical Support',
    'sfooter': 'Final Unified Prices\nRiyadh City • VAT 15%',
    'brand.tagline': 'Smart Pricing & BOQ System • RFx 4000083770',
    'sec.name': 'Saudi Electricity Company',
    'asas.name': 'Al-Asas Al-Areed Co.',
  }
};

function T(key) {
  const lang = App ? App.lang : 'ar';
  return TR[lang]?.[key] || TR['ar'][key] || key;
}

// ─── Utilities ────────────────────────────────────────────────────
function fmtNum(n) {
  if (n == null || isNaN(n)) return '0';
  return Math.round(Number(n)).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
// Alias for export.js compatibility
const formatNum = fmtNum;
const t = T;
const showToast = typeof toast === 'function' ? toast : function(msg){console.log(msg);};

function riskIcon(r) {
  return r === 'critical' ? '🔴' : r === 'medium' ? '🟡' : '🟢';
}
function riskLabel(r) {
  const lang = App ? App.lang : 'ar';
  const L = { ar: { critical:'حرج', medium:'متوسط', minor:'ثانوي' }, en: { critical:'Critical', medium:'Medium', minor:'Minor' } };
  return L[lang]?.[r] || r;
}

// ─── Storage ──────────────────────────────────────────────────────
const Store = {
  KEY: 'ps_sec_v3',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || {}; } catch { return {}; }
  },
  save(data) {
    try { localStorage.setItem(this.KEY, JSON.stringify(data)); } catch(e) { console.warn(e); }
  },
  getData() { return this.load(); },
  setKey(k, v) { const d = this.load(); d[k] = v; this.save(d); },
  getKey(k, def) { return this.load()[k] ?? def; }
};

// ─── Toast ────────────────────────────────────────────────────────
function toast(msg, type='success', dur=3500) {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => {
    el.classList.add('hide');
    setTimeout(() => el.remove(), 280);
  }, dur);
}

// ─── Main App Object ──────────────────────────────────────────────
const App = {
  lang: Store.getKey('lang', 'ar'),
  theme: Store.getKey('theme', 'dark'),
  page: 'dashboard',

  state: {
    boqNormal: { id: null, isEmergency: false, meta: { wo:'', project:'', location:'', date:'' }, items: [] },
    boqEmergency: { id: null, isEmergency: true, meta: { wo:'', project:'', location:'', date:'' }, items: [] },
    get boq() {
      return App.page === 'emergency_boq' ? this.boqEmergency : this.boqNormal;
    },
    set boq(val) {
      if (App.page === 'emergency_boq') {
        this.boqEmergency = val;
      } else {
        this.boqNormal = val;
      }
    },
    savedBOQs: Store.getKey('boqs', []),
    selectedBOQItem: null
  },

  // ── Init ──
  init() {
    this.setTheme(this.theme, false);
    this.setLang(this.lang, false);
    this.applyI18n();

    document.querySelectorAll('.nav-item[data-page]').forEach(el => {
      el.addEventListener('click', () => this.go(el.dataset.page));
    });



    this.checkMobile();
    window.addEventListener('resize', () => this.checkMobile());
    document.addEventListener('click', e => {
      if (!e.target.closest('#sidebar') && !e.target.closest('#menu-btn'))
        document.getElementById('sidebar').classList.remove('open');
    });

    this.go('dashboard');
  },

  checkMobile() {
    const mb = document.getElementById('menu-btn');
    if (mb) mb.style.display = window.innerWidth <= 1024 ? 'flex' : 'none';
  },

  // ── Theme ──
  setTheme(theme, save=true) {
    this.theme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('btn-dark').classList.toggle('active', theme === 'dark');
    document.getElementById('btn-light').classList.toggle('active', theme === 'light');
    if (save) Store.setKey('theme', theme);
  },

  // ── Language ──
  setLang(lang, save=true) {
    this.lang = lang;
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.body.classList.toggle('lang-ar', lang === 'ar');
    document.body.classList.toggle('lang-en', lang === 'en');
    document.getElementById('btn-lang-ar').classList.toggle('active', lang === 'ar');
    document.getElementById('btn-lang-en').classList.toggle('active', lang === 'en');
    if (save) Store.setKey('lang', lang);
    this.applyI18n();
    if (save) this.go(this.page); // re-render current page
  },

  applyI18n() {
    document.querySelectorAll('[data-k]').forEach(el => {
      el.textContent = T(el.dataset.k);
    });
    // Nav labels
    const nlbls = ['main','tools','ref','support'];
    nlbls.forEach(k => {
      const el = document.getElementById(`nlbl-${k}`);
      if (el) el.textContent = T(`nlbl.${k}`);
    });
    // Sidebar footer
    const sf = document.getElementById('sfooter-text');
    if (sf) sf.textContent = T('sfooter');
    // Brand tagline
    const bt = document.getElementById('brand-tagline');
    if (bt) bt.textContent = T('brand.tagline');
  },

  // ── Navigation ──
  go(page) {
    this.page = page;
    document.querySelectorAll('.nav-item[data-page]').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });

    const icons = { dashboard:'🏠', boq:'📋', emergency_boq:'🚨', analyzer:'📂', pdf:'📄', compare:'⚖️', certificate:'📜', search:'🔍', pricelist:'📊', saved:'💾', support:'📞' };
    document.getElementById('page-icon').textContent = icons[page] || '⚡';
    document.getElementById('page-title').textContent = T(`page.${page}`);

    const area = document.getElementById('page-area');
    area.innerHTML = '';
    area.style.animation = 'none';
    area.offsetHeight; // reflow
    area.style.animation = '';

    const renderers = {
      dashboard: () => this.renderDashboard(area),
      boq:       () => this.renderBOQ(area),
      emergency_boq: () => this.renderBOQ(area),
      analyzer:  () => this.renderAnalyzer(area),
      pdf:       () => this.renderPDF(area),
      compare:   () => this.renderCompare(area),
      certificate: () => this.renderCertificate(area),
      search:    () => this.renderSearch(area),
      pricelist: () => this.renderPriceList(area),
      saved:     () => this.renderSaved(area),
      support:   () => this.renderSupport(area)
    };

    if (renderers[page]) renderers[page]();

    // Close sidebar on mobile/tablet
    if (window.innerWidth <= 1024)
      document.getElementById('sidebar').classList.remove('open');
  },

  newBOQ() {
    const isEmerg = (this.page === 'emergency_boq');
    this.state.boq = { id: null, isEmergency: isEmerg, meta: { wo:'', project:'', location:'', date: new Date().toISOString().slice(0,10) }, items: [] };
    this.go(isEmerg ? 'emergency_boq' : 'boq');
  },

  // ── BOQ Storage ──
  saveBOQToStore() {
    const boqs = this.state.savedBOQs;
    const boq = { ...this.state.boq, savedAt: new Date().toISOString() };
    if (!boq.id) boq.id = 'boq_' + Date.now();
    this.state.boq.id = boq.id;
    const idx = boqs.findIndex(b => b.id === boq.id);
    if (idx >= 0) boqs[idx] = boq;
    else boqs.unshift(boq);
    this.state.savedBOQs = boqs;
    Store.setKey('boqs', boqs);
    return boq.id;
  },

  loadBOQ(id) {
    const boq = this.state.savedBOQs.find(b => b.id === id);
    if (!boq) return;
    this.state.boq = JSON.parse(JSON.stringify(boq));
    this.go(this.state.boq.isEmergency ? 'emergency_boq' : 'boq');
    toast(this.lang === 'ar' ? 'تم فتح المقايسة' : 'BOQ opened', 'info');
  },

  deleteBOQ(id) {
    const msg = this.lang === 'ar' ? 'حذف هذه المقايسة نهائياً؟' : 'Permanently delete this BOQ?';
    if (!confirm(msg)) return;
    this.state.savedBOQs = this.state.savedBOQs.filter(b => b.id !== id);
    Store.setKey('boqs', this.state.savedBOQs);
    toast(this.lang === 'ar' ? 'تم الحذف' : 'Deleted', 'warning');
    this.go('saved');
  },

  // ── BOQ Calculation ──
  boqSubtotal(items, isEmergency) {
    const isEmerg = (isEmergency !== undefined) ? isEmergency : !!this.state.boq.isEmergency;
    const mult = isEmerg ? 1.9 : 1.0;
    return Math.round(items.reduce((s, i) => {
      const p = getItemByCode(i.code);
      const up = Math.round((i.customPrice ?? (p ? p.newPrice : 0)) * mult);
      return s + Math.round(up * i.qty);
    }, 0));
  },

  // ────────────────────────────────────────────────
  // PDF ANALYZER (AI-powered)
  // ────────────────────────────────────────────────
  renderPDF(c) {
    if (typeof renderPDFAnalyzer === 'function') {
      renderPDFAnalyzer(c);
    } else {
      c.innerHTML = '<div class="alert alert-danger">خطأ: مكتبة محلل الـ PDF والذكاء الاصطناعي غير محملة.</div>';
    }
  },

  // ────────────────────────────────────────────────
  // DASHBOARD
  // ────────────────────────────────────────────────
  renderDashboard(c) {
    const ar = this.lang === 'ar';
    const boqs = this.state.savedBOQs;
    const totalBOQs = boqs.length;
    const totalItems = boqs.reduce((s,b)=>s+b.items.length,0);
    const totalVal = boqs.reduce((s,b)=>s+this.boqSubtotal(b.items, b.isEmergency),0);

    // SEC green accent header
    c.innerHTML = `

  _activeSearchCat: 'all',

  _filterSearchCat(cat, btn) {
    this._activeSearchCat = cat;
    document.querySelectorAll('.cat-chips .chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    this._triggerSearch();
  },

  _setupBOQSearch() {
    const inp = document.getElementById('boq-search');
    if (!inp) return;

    inp.addEventListener('input', () => {
      this._triggerSearch();
    });
    
    // Automatically trigger initial search to show default list of items!
    this._triggerSearch();
  },

  _triggerSearch() {
    const inp = document.getElementById('boq-search');
    const q = inp ? inp.value.trim() : '';
    
    let res = [];
    if (q.length > 0) {
      res = searchItems(q);
    } else if (this._activeSearchCat !== 'all') {
      res = PRICE_LIST.filter(i => i.cat === this._activeSearchCat);
    } else {
      // By default when empty, show the first 30 items of the catalog for vertical selection
      res = PRICE_LIST;
    }

    if (this._activeSearchCat !== 'all' && q.length > 0) {
      res = res.filter(i => i.cat === this._activeSearchCat);
    }

    this._renderCatalogResults(res.slice(0, 30));
  },

  _getCatLabel(cat) {
    const ar = this.lang === 'ar';
    const labels = {
      all: ar ? 'الكل' : 'All',
      cable: ar ? 'كابلات وتمديد' : 'Cables',
      excavation: ar ? 'حفر ومدني' : 'Civils',
      equipment: ar ? 'معدات ومحولات' : 'Equipment',

  _addFromCatalog(code) {
    const qtyInput = document.getElementById(`cat-qty-${code}`);
    const qty = qtyInput ? parseFloat(qtyInput.value) || 1 : 1;
    const p = getItemByCode(code);
    if (!p) return;

    this.state.boq.items.push({ code, qty, customPrice: null, note: '' });
    toast(this.lang==='ar' ? `تمت إضافة بند ${code} للمقايسة` : `Added item ${code} to BOQ`);
    this._renderBOQTable();
  },

  _renderBOQReminders(depResults) {
    const ar = this.lang === 'ar';
    const c = document.getElementById('boq-related-reminders');
    if (!c) return;

    if (!depResults || (!depResults.missing.length && !depResults.warnings.length)) {
      c.innerHTML = `
        <div style="background:rgba(0,132,61,0.04);border:1px dashed var(--border-sec);border-radius:var(--r-md);padding:12px;margin:16px;text-align:center;color:var(--accent-green);font-size:12.5px;font-weight:700;">
          ✅ ${ar?'المقايسة متوازنة ومكتملة تماماً بموجب شروط ومواصفات العقد الموحد!':'BOQ workbook is completely balanced and technically compliant!'}
        </div>
      `;
      return;
    }

    let html = `
      <div style="background: rgba(200,168,75,0.03); border: 1px dashed rgba(200,168,75,0.28); border-radius: var(--r-md); padding: 16px; margin: 16px; position:relative; overflow:hidden;">
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 5% 50%,rgba(200,168,75,0.08),transparent 45%);pointer-events:none;"></div>
        <div style="display:flex;align-items:center;gap:8px;font-weight:900;color:var(--accent-gold);margin-bottom:12px;font-size:13.5px;border-bottom:1px solid rgba(200,168,75,0.15);padding-bottom:8px;">
          <span>📌</span>
          <span>${ar ? 'بنود مكملة مفقودة للتذكير والتوازن الفني (Labor-Material Balance)' : 'Suggested Complementary Items (Labor-Material Balance)'}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
    `;

    const allReminders = [...depResults.missing, ...depResults.warnings];
    const seenCodes = new Set();

    allReminders.forEach(m => {
      const codes = m.missingCodes || m.suggestedCodes || [];
      codes.forEach(c => {
        if (seenCodes.has(c)) return;
        seenCodes.add(c);
        const p = getItemByCode(c);
        if (!p) return;

        html += `
          <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--border);border-right:3px solid ${m.risk === 'critical' ? 'var(--accent-red)' : 'var(--accent-gold)'};border-radius:var(--r-md);padding:10px 14px;gap:12px;">
            <div style="text-align:right;flex:1;min-width:0;font-size:12.5px;">
              <div style="display:flex;align-items:center;gap:6px;">
                <span class="uom-tag" style="font-family:var(--font-mono);font-size:10px;background:rgba(255,255,255,0.05);color:var(--text-code);padding:1px 5px;border-radius:3px;">${c}</span>
                <strong style="color:var(--text-h);">${p.arDesc}</strong>
              </div>
              <div style="font-size:11px;color:${m.risk === 'critical' ? 'var(--accent-red)' : 'var(--accent-gold)'};margin-top:4px;display:flex;align-items:center;gap:4px;">
                <span>⚠️</span>
                <span>${m.reason}</span>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
              <span class="uom-tag" style="font-size:11px;">${p.uom}</span>
              <span style="font-size:12.5px;font-weight:900;color:var(--sec-primary);">${fmtNum(p.newPrice)} ر.س</span>
              <button class="btn btn-primary btn-sm" style="font-size:11.5px;padding:5px 12px;" onclick="App._addFromCatalog('${c}')">➕ ${ar?'إضافة سريعة':'Quick Add'}</button>
            </div>
          </div>
        `;
      });
    });

    html += `
        </div>
      </div>
    `;

    c.innerHTML = html;
  },

  _saveMeta() {
    const m = this.state.boq.meta;
    m.wo = document.getElementById('meta-wo')?.value || m.wo;
    m.project = document.getElementById('meta-project')?.value || m.project;
    m.location = document.getElementById('meta-location')?.value || m.location;
    m.date = document.getElementById('meta-date')?.value || m.date;
  },

  _renderBOQTable() {
    const tbody = document.getElementById('boq-tbody');
    const totals = document.getElementById('boq-totals');
    const count = document.getElementById('boq-count');
    if (!tbody) return;
    const items = this.state.boq.items;
    const ar = this.lang === 'ar';
    const isEmerg = !!this.state.boq.isEmergency;
    const mult = isEmerg ? 1.9 : 1.0;

    if (count) count.textContent = `${items.length} ${ar?'بند':'items'}`;

    if (!items.length) {
      tbody.innerHTML = `<div class="empty-state" style="padding:40px 20px;">
        <div class="empty-icon">📋</div>
        <h3>${ar?'لا توجد بنود بعد':'No items yet'}</h3>
        <p>${ar?'ابدأ بإضافة بند من مربع البحث أعلاه':'Add items from the search box above'}</p>
      </div>`;
      if (totals) totals.style.display = 'none';
      return;
    }
    if (totals) totals.style.display = 'block';

    let html = `<div class="tbl-wrap"><table class="data-table"><thead><tr>
      <th>#</th><th>${ar?'الرمز':'Code'}</th><th>${ar?'الوصف':'Description'}</th>
      <th>${ar?'وحدة':'UOM'}</th><th>${ar?'الكمية':'Qty'}</th>
      <th>${ar ? (isEmerg ? 'السعر (طوارئ 190%)' : 'السعر الموحد') : (isEmerg ? 'Price (Emerg 190%)' : 'Unified Price')}</th>
      <th>${ar?'الإجمالي':'Total'}</th><th>${ar?'ملاحظة':'Note'}</th><th></th>
    </tr></thead><tbody>`;

    let n=1; let lastSec='';
    items.forEach((itm,idx)=>{
      const p = getItemByCode(itm.code);
      const up = Math.round((itm.customPrice ?? (p?.newPrice ?? 0)) * mult);
      const tot = up * itm.qty;
      if(p && p.section!==lastSec){
        lastSec=p.section;
        html+=`<tr><td colspan="9" class="td-section">📁 ${p.section}</td></tr>`;
      }
      html+=`<tr>
        <td style="color:var(--text-muted);font-size:11px;">${n++}</td>
        <td class="td-code">${itm.code}</td>
        <td class="td-desc"><div class="td-desc-ar">${p?.arDesc||'—'}</div><div class="td-desc-en">${p?.enDesc||''}</div></td>
        <td><span class="uom-tag">${p?.uom||''}</span></td>
        <td><input class="qty-cell-input" type="number" value="${itm.qty}" min="0.01" step="0.01" onchange="App.updateBOQQty(${idx},this.value)"></td>
        <td class="td-price">${fmtNum(up)}</td>
        <td class="td-total">${fmtNum(tot)}</td>
        <td><input class="form-control" style="width:110px;font-size:11px;padding:4px 8px;" value="${itm.note||''}" placeholder="${ar?'ملاحظة':'Note'}" onchange="App.state.boq.items[${idx}].note=this.value"></td>
        <td><button class="btn btn-danger btn-sm btn-icon" onclick="App.removeBOQItem(${idx})">✕</button></td>
      </tr>`;
    });
    tbody.innerHTML = html;
    const depResults = checkDependencies(items);
    this._renderBOQReminders(depResults);
    this._updateTotals();
  },

  updateBOQQty(idx,v) { this.state.boq.items[idx].qty=parseFloat(v)||1; this._updateTotals(); },
  removeBOQItem(idx) { this.state.boq.items.splice(idx,1); this._renderBOQTable(); },
  clearBOQ() { if(!confirm(this.lang==='ar'?'مسح جميع البنود؟':'Clear all items?'))return; this.state.boq.items=[]; this._renderBOQTable(); if(typeof BOQImporter!=='undefined') BOQImporter.clearSession(); },

  _checkSessionRestore() {
    if (typeof BOQImporter === 'undefined') return;
    const session = BOQImporter.restoreSession();
    if (!session || !session.items || session.items.length === 0) return;
    if (this.state.boq.items.length > 0) return; // BOQ already has items
    this.state.boq.items = session.items || [];
    if (session.meta) Object.assign(this.state.boq.meta, session.meta);
    this._renderBOQTable();
  },

  _restoreBOQSession() {
    if (typeof BOQImporter === 'undefined') return;
    const session = BOQImporter.restoreSession();
    if (!session) return;
    this.state.boq.items = session.items || [];
    if (session.meta) Object.assign(this.state.boq.meta, session.meta);
    this._renderBOQTable();
    const banner = document.getElementById('boq-session-restore-banner');
    if (banner) banner.style.display = 'none';
    toast(this.lang==='ar'?`✅ تمت استعادة ${this.state.boq.items.length} بند من الجلسة السابقة`:`✅ Restored ${this.state.boq.items.length} items from session`, 'success');
  },

  _dismissSessionRestore() {
    const banner = document.getElementById('boq-session-restore-banner');
    if (banner) banner.style.display = 'none';
    if (typeof BOQImporter !== 'undefined') BOQImporter.clearSession();
  },

  _updateTotals() {
    const sub = this.boqSubtotal(this.state.boq.items);
    const vat = Math.round(sub * 0.15);
    const ar = this.lang==='ar';
    const sar = ar?' ر.س':' SAR';
    const e=id=>document.getElementById(id);
    if(e('t-sub')) e('t-sub').textContent=fmtNum(sub)+sar;
    if(e('t-vat')) e('t-vat').textContent=fmtNum(vat)+sar;
    if(e('t-grand')) e('t-grand').textContent=fmtNum(sub+vat)+sar;
  },

  saveBOQ() {
    this._saveMeta();
    if(!this.state.boq.items.length){ toast(this.lang==='ar'?'أضف بنوداً أولاً':'Add items first','warning'); return; }
    this.saveBOQToStore();
    toast(this.lang==='ar'?'تم حفظ المقايسة ✅':'BOQ saved ✅','success');
  },

  exportBOQ(type) {
    this._saveMeta();
    if(!this.state.boq.items.length){ toast(this.lang==='ar'?'لا توجد بنود':'No items to export','warning'); return; }
    
    const isEmerg = !!this.state.boq.isEmergency;
    const mult = isEmerg ? 1.9 : 1.0;
    const mappedItems = this.state.boq.items.map(item => {
      const p = getItemByCode(item.code);
      const basePrice = item.customPrice || p?.newPrice || 0;
      return {
        ...item,
        contractPrice: Math.round(basePrice * mult),
        priceItem: p
      };
    });

    const boqData = {
      ...this.state.boq,
      items: mappedItems
    };

    if(type==='excel') exportToExcel(boqData, this.state.boq.meta);
    else if(type==='pdf') exportToPDF(boqData, this.state.boq.meta);
    else if(type==='json') exportToJSON(boqData, this.state.boq.meta);
    else if(type==='sheet') exportMeasurementSheet(boqData, this.state.boq.meta);
    else if(type==='csv') exportToCSV(boqData, this.state.boq.meta);
    else if(type==='odoo') {
      if (typeof ERPIntegration !== 'undefined') {
        ERPIntegration.exportToOdoo(this.state.boq.meta.project || 'Odoo_BOQ', mappedItems);
        toast(this.lang==='ar'?'تم تصدير ملف Odoo بنجاح!':'Odoo file exported successfully!');
      } else {
        toast('ERP module missing','error');
      }
    }
    else if(type==='sap') {
      if (typeof ERPIntegration !== 'undefined') {
        ERPIntegration.exportToSAP(this.state.boq.meta.project || 'SAP_BOQ', mappedItems);
        toast(this.lang==='ar'?'تم تصدير ملف SAP بنجاح!':'SAP file exported successfully!');
      } else {
        toast('ERP module missing','error');
      }
    }
  },

        balanceHtml = `
          <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
            <div style="font-size:12.5px;font-weight:800;color:var(--text-h);margin-bottom:10px;">⚖️ ${ar?'توازن المواد مقابل التركيب والأعمال والجاهزية:':'Material vs Labor Balance & Readiness:'}</div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap;">
              <div style="flex:1;position:relative;border-radius:99px;height:16px;overflow:hidden;background:var(--bg-card);border:1px solid var(--border);">
                <div style="position:absolute;top:0;right:0;height:100%;width:${Math.min(bal.materialPct, 100)}%;background:linear-gradient(90deg,#00B5B8,#007B87);border-radius:99px 0 0 99px;"></div>

              <div style="font-size:11.5px;font-weight:700;color:var(--text-main);min-width:140px;text-align:left;">
                ${ar?'جاهزية المقايسة:':'Readiness Score:'} <span style="color:${bal.readinessScore < 55 ? 'var(--accent-red)' : bal.readinessScore < 75 ? 'var(--accent-gold)' : 'var(--sec-primary)'};">${bal.readinessScore}/100</span>

            </div>
            <div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--text-sub);">
              <span>${ar?'مواد:':'Material:'} <strong style="color:#00B5B8">${bal.materialPct}%</strong></span>
              <span>${ar?'أعمال وتركيب:':'Labor & Civils:'} <strong style="color:var(--sec-gold)">${bal.laborPct}%</strong></span>
              <span>${ar?'موازنة SEC المثالية: 55% مواد / 45% تركيب':'Ideal SEC balance: 55% Mat / 45% Labor'}</span>
            </div>
          </div>
        `;
      }
    }

    let html = `<div class="validator-wrap" style="animation:pageFade 0.25s ease;">
      <div class="validator-head" style="background:${nm?'rgba(255,77,106,0.07)':'rgba(0,132,61,0.07)'};padding:12px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:900;">
        <span>${nm?'🔴':'✅'}</span>
        <span>${nm?`${nm} ${ar?'بند فني مفقود أو غير متوازن':'missing technical items(s)'}`:ar?'تم تدقيق المقايسة بنجاح! متطابقة ومستوفية للشروط':'BOQ is complete & balanced!'}</span>
        ${nw?`<span class="badge badge-medium" style="margin-${ar?'right':'left'}:auto;font-size:11px;">🟡 ${nw} ${ar?'تنبيه كفاءة':'efficiency warning(s)'}</span>`:''}
      </div>`;

    if(!nm&&!nw){
      html+=`<div class="validator-item" style="padding:14px 18px;">
        <div class="v-icon">✅</div>
        <div class="v-body">
          <div class="v-title" style="color:var(--sec-primary);font-size:13.5px;font-weight:800;">${ar?'المطابقة الفنية مطابقة ومستوفية للشروط 100%':'Technical Specs & Compliance are 100% Valid'}</div>
          <div class="v-desc" style="font-size:11.5px;">${ar?'تم فحص المقايسة ومطابقة بنود التوريد ببنود التركيب وربطها بالكامل لتفادي أي ملاحظات أو غرامات من الشركة السعودية للكهرباء.':'All material supply items are matched with equivalent installation items for SEC compliance.'}</div>
        </div>
      </div>`;
    }

    res.missing.forEach(m=>{
      html+=`<div class="validator-item" style="padding:14px 18px;">
        <div class="v-icon">${riskIcon(m.risk)}</div>
        <div class="v-body">
          <div class="v-title" style="font-size:13px;font-weight:700;color:var(--text-h);">${m.reason}</div>
          <div class="v-desc" style="font-size:11.5px;margin-top:2px;">${ar?'بسبب وجود:':'Triggered by:'} <strong>${m.triggeredByName}</strong> (${m.triggeredBy})</div>
          <div class="v-codes" style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">
            ${m.missingCodes.map(c=>`<span class="v-code-btn" onclick="App.quickAdd('${c}')" title="${getItemByCode(c)?.arDesc||''}" style="font-family:var(--font-mono);font-size:10.5px;background:rgba(0,132,61,0.06);border:1px solid rgba(0,132,61,0.15);padding:3px 8px;border-radius:4px;cursor:pointer;color:var(--sec-primary);">${ar?'➕ إضافة البند':'➕ Add'} ${c}</span>`).join('')}
          </div>
          ${m.suggestedQty&&m.suggestedQty!=='same'?`<div style="font-size:10.5px;color:var(--accent-gold);margin-top:4px;">${ar?'الكمية المقترحة:':'Suggested qty:'} ${m.suggestedQty}</div>`:''}
        </div>
        <span class="badge badge-${m.risk}" style="font-size:10.5px;margin-${ar?'right':'left'}:auto;height:fit-content;">${riskIcon(m.risk)} ${riskLabel(m.risk)}</span>
      </div>`;
    });

    res.warnings.forEach(w=>{
      html+=`<div class="validator-item" style="padding:14px 18px;">
        <div class="v-icon">🟡</div>
        <div class="v-body">
          <div class="v-title" style="font-size:13px;font-weight:700;color:var(--accent-gold);">${w.reason}</div>
          <div class="v-desc" style="font-size:11.5px;margin-top:2px;">${ar?'مرتبط بـ:':'Related to:'} ${w.triggeredByName}</div>
          <div class="v-codes" style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">
            ${w.suggestedCodes.map(c=>`<span class="v-code-btn" onclick="App.quickAdd('${c}')" style="font-family:var(--font-mono);font-size:10.5px;background:rgba(200,168,75,0.06);border:1px solid rgba(200,168,75,0.15);padding:3px 8px;border-radius:4px;cursor:pointer;color:var(--sec-gold);">${ar?'➕ إضافة البند':'➕ Add'} ${c}</span>`).join('')}
          </div>
        </div>
        <span class="badge badge-medium" style="font-size:10.5px;margin-${ar?'right':'left'}:auto;height:fit-content;">🟡 ${ar?'اختياري':'Optional'}</span>
      </div>`;
    });

    html += balanceHtml;
    html += crewSummaryHtml;
    html += equipSummaryHtml;

    if (totalWorkDays > 0) {
      html += `
        <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;background:rgba(200,168,75,0.03);border:1px dashed var(--border-gold);border-radius:var(--r-md);padding:12px 16px;">
          <div style="font-size:12.5px;font-weight:800;color:var(--sec-gold);margin-bottom:6px;">ℹ️ ${ar?'توصيات تشغيلية وجدولة المشروع (وزارة الموارد البشرية):':'Operations & Project Schedule (HR Ministry Guidelines):'}</div>
          <p style="font-size:11.5px;color:var(--text-sub);line-height:1.6;margin-bottom:0;">
            📅 ${ar
              ? `إجمالي أيام العمل المقدرة للتنفيذ هي <strong>${Math.ceil(totalWorkDays)} يوم عمل</strong> (بافتراض أطقم متتالية).<br>`
              : `Total estimated work duration: <strong>${Math.ceil(totalWorkDays)} days</strong>.<br>`}
            🇸🇦 ${ar
              ? 'توجيهات سوق العمل السعودي: يُحظر تشغيل العمالة تحت أشعة الشمس المباشرة من الساعة 12:00 ظهراً حتى الساعة 3:00 مساءً خلال الفترة من 15 يونيو إلى 15 سبتمبر. يرجى أخذ هذا في الاعتبار عند جدولة المشروع لتجنب العقوبات والمخالفات.'
              : 'mid-day working restriction: Outdoor labor is strictly prohibited under direct sunlight from 12 PM to 3 PM between June 15 and September 15. Please factor this into project schedules to remain fully compliant with Ministry of Human Resources regulations.'}
          </p>
        </div>
      `;
    }

    html+='</div>';
    panel.innerHTML = html;
  },

  quickAdd(code) {
    const item = getItemByCode(code);
    if(!item) return;
    this.state.boq.items.push({code, qty:1, customPrice:null, note:''});
    this._renderBOQTable();
    this.runDepsCheck();
    toast(`${this.lang==='ar'?'تمت إضافة':'Added'}: ${item.arDesc.slice(0,28)}...`);
  },

  // MANUAL ANALYZER
  // ────────────────────────────────────────────────
  renderAnalyzer(c) {
    const ar = this.lang==='ar';
    c.innerHTML = `
      <div class="grid-2" style="align-items:start;">
        <div>
          <div class="card mb-16">
            <div class="card-head"><span>📂</span><span class="card-title">${ar?'استيراد بيانات المقايسة':'Import BOQ Data'}</span></div>
            <div class="card-body">
              <div class="tabs">
                <button class="tab-btn active" onclick="App._anaTab('manual',this)">${ar?'إدخال يدوي':'Manual Input'}</button>

              </div>
              <div id="ana-manual">
                <div class="form-group">
                  <label class="form-label">${ar?'رقم أمر العمل':'Work Order No.'}</label>
                  <input class="form-control" id="ana-wo" placeholder="${ar?'اختياري':'Optional'}">
                </div>
                <div id="ana-rows-wrap"></div>
                <button class="btn btn-outline btn-sm" onclick="App._addAnaRow()">➕ ${ar?'إضافة بند':'Add Row'}</button>
              </div>
              <div id="ana-csv" style="display:none;">
                <div class="alert alert-info">
                  <span class="alert-icon">ℹ️</span>
                  <div>${ar?'أدخل بيانات بصيغة CSV: رمز,كمية,سعر (سعر اختياري)':'Enter data as CSV: code,qty,price (price optional)'}<br>
                  <code style="font-family:var(--font-mono);font-size:11px;">304010101,100,9</code></div>
                </div>
                <textarea class="form-control" id="ana-csv-data" rows="8" placeholder="304010101,100,9&#10;301010101,100,65&#10;305010301,2,196" style="font-family:var(--font-mono);font-size:12px;"></textarea>
              </div>
              <div class="divider"></div>
              <button class="btn btn-primary btn-full" onclick="App.runAnalysis()">🔍 ${ar?'تشغيل التحليل':'Run Analysis'}</button>
            </div>
          </div>
        </div>
        <div id="ana-result">
          <div class="card"><div class="card-body">
            <div class="empty-state" style="padding:44px 10px;">
              <div class="empty-icon">📊</div>
              <h3>${ar?'جاهز للتحليل':'Ready to Analyze'}</h3>
              <p>${ar?'أدخل البيانات واضغط تشغيل التحليل':'Enter data and press Run Analysis'}</p>
            </div>
          </div></div>
        </div>
      </div>
    `;
    this._anaTabActive='manual';
    this._addAnaRow();
  },

  _anaTab(tab, btn) {
    this._anaTabActive=tab;
    document.getElementById('ana-manual').style.display=tab==='manual'?'block':'none';
    document.getElementById('ana-csv').style.display=tab==='csv'?'block':'none';
    document.querySelectorAll('#ana-manual').forEach(()=>{});
    btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b===btn));
  },

  _anaRowId: 0,
  _addAnaRow() {
    const wrap = document.getElementById('ana-rows-wrap');
    if(!wrap) return;
    const id=++this._anaRowId;
    const ar=this.lang==='ar';
    const div=document.createElement('div');
    div.id=`ana-row-${id}`;
    div.style.cssText='display:grid;grid-template-columns:1fr 80px 90px auto;gap:8px;margin-bottom:8px;align-items:center;';
    div.innerHTML=`
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="form-control search-input" id="ana-s-${id}" placeholder="${ar?'رمز البند أو الوصف...':'Item code or desc...'}" autocomplete="off" data-code="">
        <div class="dropdown-results" id="ana-dd-${id}"></div>
      </div>
      <input class="form-control" id="ana-q-${id}" type="number" value="1" placeholder="${ar?'كمية':'Qty'}">
      <input class="form-control" id="ana-p-${id}" type="number" placeholder="${ar?'السعر':'Price'}" data-code="">
      <button class="btn btn-danger btn-sm btn-icon" onclick="document.getElementById('ana-row-${id}').remove()">✕</button>
    `;
    wrap.appendChild(div);

    const si=document.getElementById(`ana-s-${id}`);
    const dd=document.getElementById(`ana-dd-${id}`);
    si.addEventListener('input',()=>{
      const res=searchItems(si.value.trim()).slice(0,8);
      if(!res.length||!si.value.trim()){dd.classList.remove('open');return;}
      dd.innerHTML=res.map(item=>`
        <div class="dropdown-item" onclick="App._selAna(${id},'${item.code}')">
          <span class="di-code">${item.code}</span>
          <span class="di-desc">${item.arDesc}</span>
          <span class="di-price">${fmtNum(item.newPrice)}</span>
        </div>
      `).join('');
      dd.classList.add('open');
    });
    document.addEventListener('click',e=>{ if(!e.target.closest(`#ana-s-${id}`)&&!e.target.closest(`#ana-dd-${id}`)) dd.classList.remove('open'); });
  },

  _selAna(id,code) {
    const item=getItemByCode(code);
    if(!item) return;
    const si=document.getElementById(`ana-s-${id}`);
    if(si){si.value=`${code} — ${item.arDesc}`;si.dataset.code=code;}
    const pi=document.getElementById(`ana-p-${id}`);
    if(pi){pi.value=item.newPrice;pi.dataset.code=code;}
    document.getElementById(`ana-dd-${id}`)?.classList.remove('open');
  },

  runAnalysis() {
    const ar=this.lang==='ar';
    let items=[];
    if(this._anaTabActive==='manual'){
      document.querySelectorAll('[id^="ana-s-"]').forEach(el=>{
        const id=el.id.replace('ana-s-','');
        const code=el.dataset.code||el.value.split('—')[0].trim();
        const qty=parseFloat(document.getElementById(`ana-q-${id}`)?.value)||1;
        const price=parseFloat(document.getElementById(`ana-p-${id}`)?.value)||null;
        if(code&&getItemByCode(code)) items.push({code,qty,customPrice:price});
      });
    } else {
      const csv=document.getElementById('ana-csv-data')?.value||'';
      csv.split('\n').forEach(line=>{
        const [code,qty,price]=(line||'').trim().split(',');
        if(code?.trim()&&getItemByCode(code.trim())) items.push({code:code.trim(),qty:parseFloat(qty)||1,customPrice:parseFloat(price)||null});
      });
    }

    if(!items.length){toast(ar?'لا توجد بنود صالحة':'No valid items','warning');return;}

    const wo=document.getElementById('ana-wo')?.value||'—';
    const dep=checkDependencies(items);
    const total=items.reduce((s,i)=>{const p=getItemByCode(i.code);return s+(i.customPrice||(p?p.newPrice:0))*i.qty;},0);
    const vat=total*0.15;

    document.getElementById('ana-result').innerHTML=`
      <div class="card mb-16">
        <div class="card-head"><span>📋</span><span class="card-title">${ar?'تقرير تحليل المقايسة':'BOQ Analysis Report'} — ${wo}</span>
          <button class="btn btn-sm btn-primary" onclick="App._importAnaItems(${JSON.stringify(items).replace(/"/g,'&quot;')})">📥 ${ar?'استيراد للمنشئ':'Import to Builder'}</button>
        </div>
        <div class="card-body">
          <div class="grid-3" style="margin-bottom:16px;">
            <div style="text-align:center;"><div style="font-size:10.5px;color:var(--text-muted);">${ar?'البنود':'Items'}</div><div style="font-size:22px;font-weight:800;">${items.length}</div></div>
            <div style="text-align:center;"><div style="font-size:10.5px;color:var(--text-muted);">${ar?'الإجمالي':'Subtotal'}</div><div style="font-size:22px;font-weight:800;color:var(--accent-gold);">${fmtNum(total)}</div></div>
            <div style="text-align:center;"><div style="font-size:10.5px;color:var(--text-muted);">${ar?'شامل الضريبة':'With VAT'}</div><div style="font-size:22px;font-weight:800;color:var(--sec-primary);">${fmtNum(total+vat)}</div></div>
          </div>
        </div>
        <div class="tbl-wrap"><table class="data-table"><thead><tr>
          <th>#</th><th>${ar?'الرمز':'Code'}</th><th>${ar?'الوصف':'Desc'}</th><th>${ar?'وحدة':'UOM'}</th>
          <th>${ar?'الكمية':'Qty'}</th><th>${ar?'سعر أمر العمل':'WO Price'}</th><th>${ar?'السعر الموحد':'Unified'}</th><th>${ar?'الحالة':'Status'}</th><th>${ar?'الإجمالي':'Total'}</th>
        </tr></thead><tbody>
          ${items.map((itm,i)=>{
            const p=getItemByCode(itm.code);
            const cp=p?p.newPrice:0;
            const ep=itm.customPrice||cp;
            const diff=ep-cp;
            const pct=cp?((diff/cp)*100).toFixed(1):'0';
            const tot=ep*itm.qty;
            const status=Math.abs(parseFloat(pct))<=5?`<span class="badge badge-ok">✅ ${ar?'مطابق':'Match'}</span>`:parseFloat(pct)>5?`<span class="badge badge-critical">🔺 +${pct}%</span>`:`<span class="badge badge-medium">🔻 ${pct}%</span>`;
            return `<tr>
              <td style="color:var(--text-muted);font-size:11px;">${i+1}</td>
              <td class="td-code">${itm.code}</td>
              <td class="td-desc"><div class="td-desc-ar">${p?.arDesc||'—'}</div></td>
              <td><span class="uom-tag">${p?.uom||''}</span></td>
              <td>${itm.qty}</td>
              <td class="td-price ${parseFloat(pct)>5?'price-up':parseFloat(pct)<-5?'price-down':''}">${fmtNum(ep)}</td>
              <td style="color:var(--text-muted);font-size:12px;">${fmtNum(cp)}</td>
              <td>${status}</td>
              <td class="td-total">${fmtNum(tot)}</td>
            </tr>`;
          }).join('')}
        </tbody></table></div>
      </div>
      ${dep.missing.length ? `
        <div class="card" style="margin-top:16px;">
          <div class="card-head" style="background:rgba(255,77,106,0.07);">
            <span>⚠️</span>
            <span class="card-title" style="color:var(--accent-red);">${ar?'بنود مكملة مفقودة للتوازن':'Missing Complementary Items'} — ${dep.missing.length}</span>
          </div>
          <div class="validator-wrap">
            ${dep.missing.map(m => `
              <div class="validator-item" style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;">
                <div class="v-icon">${riskIcon(m.risk)}</div>
                <div class="v-body" style="flex:1;text-align:right;">
                  <div class="v-title" style="font-weight:700;font-size:12.5px;color:var(--text-h);">${m.reason}</div>
                  <div class="v-desc" style="font-size:11px;color:var(--text-sub);margin-top:2px;">${ar?'بسبب وجود:':'Triggered by:'} <strong>${m.triggeredByName}</strong> (${m.triggeredBy})</div>
                  <div class="v-codes" style="display:flex;gap:6px;margin-top:6px;">
                    ${m.missingCodes.map(c => `<span class="v-code-btn" style="cursor:pointer;background:var(--sec-primary-faint);color:var(--sec-primary);border:1px solid var(--border-sec);padding:2px 6px;border-radius:4px;font-size:10.5px;font-family:var(--font-mono);" onclick="App.quickAdd('${c}')" title="${getItemByCode(c)?.arDesc||''}">${c}</span>`).join('')}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      ` : `
        <div class="alert alert-ok" style="margin-top:16px;">
          <span class="alert-icon">✅</span>
          <span>${ar?'المقايسة متكاملة ومتوازنة تماماً بموجب شروط ومواصفات العقد الموحد!':'BOQ workbook is completely balanced and technically compliant!'}</span>
        </div>
      `}
    `;
  },

  _importAnaItems(items) {
    this.state.boq.items=[...this.state.boq.items,...items];
    this.go('boq');
    toast(this.lang==='ar'?`تم استيراد ${items.length} بند`:`Imported ${items.length} items`);
  },

  // ────────────────────────────────────────────────
  // SEARCH
  // ────────────────────────────────────────────────
  renderSearch(c) {
    const ar=this.lang==='ar';
    c.innerHTML=`
      <div class="card mb-16"><div class="card-body">
        <div class="search-wrap mb-12">
          <span class="search-icon">🔍</span>
          <input class="form-control search-input" id="main-search" style="font-size:15px;padding:13px 42px 13px 14px;" placeholder="${ar?'ابحث بالرمز أو الوصف العربي أو الإنجليزي...':'Search by code or Arabic/English description...'}">
        </div>
        <div class="cat-chips">
          ${CATEGORIES.map(cat=>`<button class="chip${cat.id==='all'?' active':''}" data-cat="${cat.id}" onclick="App._filterCat('${cat.id}',this)">${cat.label}</button>`).join('')}
        </div>
        <div style="font-size:12px;color:var(--text-muted);" id="search-count">${PRICE_LIST.length} ${ar?'بند إجمالاً':'items total'}</div>
      </div></div>
      <div id="search-results"></div>
    `;
    this._searchCat='all';
    this._renderSearchResults(PRICE_LIST);
    document.getElementById('main-search').addEventListener('input',function(){ App._applySearch(this.value); });
  },

  _filterCat(cat,btn) {
    this._searchCat=cat;
    document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
    this._applySearch(document.getElementById('main-search')?.value||'');
  },

  _applySearch(q) {
    let items=searchItems(q);
    if(this._searchCat!=='all') items=items.filter(i=>i.cat===this._searchCat);
    const el=document.getElementById('search-count');
    const ar=this.lang==='ar';
    if(el) el.textContent=`${items.length} ${ar?'نتيجة':'result(s)'}`;
    this._renderSearchResults(items);
  },

  _renderSearchResults(items) {
    const c=document.getElementById('search-results');
    if(!c) return;
    const ar=this.lang==='ar';
    if(!items.length){ c.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><h3>${ar?'لا توجد نتائج':'No results'}</h3></div>`; return; }
    const grouped={};
    items.forEach(i=>{ if(!grouped[i.section]) grouped[i.section]=[]; grouped[i.section].push(i); });
    c.innerHTML=Object.entries(grouped).map(([section,secItems])=>`
      <div class="card mb-16">
        <div class="card-head"><span>📁</span><span class="card-title">${section}</span><span style="font-size:11px;color:var(--text-muted);margin-${ar?'right':'left'}:auto;">${secItems.length} ${ar?'بند':'items'}</span></div>
        <div class="tbl-wrap"><table class="data-table"><thead><tr>
          <th>${ar?'الرمز':'Code'}</th><th>${ar?'الوصف العربي':'Arabic Desc'}</th><th>${ar?'الإنجليزي':'English'}</th>
          <th>${ar?'وحدة':'UOM'}</th><th>${ar?'السعر الموحد':'Unified Price'}</th><th></th>
        </tr></thead><tbody>
          ${secItems.map(item=>{
            return `<tr>
              <td class="td-code">${item.code}</td>
              <td class="td-desc"><div class="td-desc-ar">${item.arDesc}</div></td>
              <td style="font-size:11px;color:var(--text-muted);">${item.enDesc}</td>
              <td><span class="uom-tag">${item.uom}</span></td>
              <td class="td-price">${fmtNum(item.newPrice)}</td>
              <td><button class="btn btn-primary btn-sm" onclick="App._addFromSearch('${item.code}')">➕</button></td>
            </tr>`;
          }).join('')}
        </tbody></table></div>
      </div>
    `).join('');
  },

  _addFromSearch(code) {
    const item=getItemByCode(code);
    if(!item) return;
    this.state.boq.items.push({code,qty:1,customPrice:null,note:''});
    toast(`${item.arDesc.slice(0,28)}... ${this.lang==='ar'?'أضيف':'added'}`);
  },

  // ────────────────────────────────────────────────
  // COMPARE
  // ────────────────────────────────────────────────
  renderCompare(c) {
    const ar=this.lang==='ar';
    const savedOpts=this.state.savedBOQs.map(b=>`<option value="${b.id}">${b.meta.wo||b.id} — ${b.meta.project||''}</option>`).join('');
    c.innerHTML=`
      <div class="grid-2 mb-16">
        ${['A','B'].map(x=>`
          <div class="card">
            <div class="card-head"><span>${x==='A'?'🅰️':'🅱️'}</span><span class="card-title">${ar?`المقايسة (${x})`:x==='A'?'BOQ (A)':'BOQ (B)'}</span></div>
            <div class="card-body">
              <div class="form-group"><label class="form-label">${ar?'اختر محفوظة':'Select Saved'}</label>
                <select class="form-control" id="cmp-sel-${x}"><option value="">— ${ar?'اختر':'Select'} —</option>${savedOpts}</select>
              </div>
              <div style="font-size:11px;color:var(--text-muted);text-align:center;margin:8px 0;">— ${ar?'أو':'or'} —</div>
              <div class="form-group"><label class="form-label">CSV (${ar?'رمز,كمية,سعر':'code,qty,price'})</label>
                <textarea class="form-control" id="cmp-csv-${x}" rows="5" placeholder="304010101,100,9&#10;301010101,100" style="font-family:var(--font-mono);font-size:11px;"></textarea>
              </div>
              <div class="form-group"><label class="form-label">${ar?'اسم للعرض':'Label'}</label>
                <input class="form-control" id="cmp-lbl-${x}" value="${ar?`المقايسة ${x}`:x==='A'?'BOQ A':'BOQ B'}">
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      <div style="text-align:center;margin-bottom:20px;">
        <button class="btn btn-primary btn-lg" onclick="App.runCompare()">⚖️ ${ar?'تشغيل المقارنة':'Run Comparison'}</button>
      </div>
      <div id="compare-result"></div>
    `;
  },

  _getCmpItems(selId,csvId) {
    const sid=document.getElementById(selId)?.value;
    if(sid){ const b=this.state.savedBOQs.find(x=>x.id===sid); if(b) return b.items.map(i=>{ const p=getItemByCode(i.code); return {code:i.code,qty:i.qty,price:i.customPrice||(p?p.newPrice:0)}; }); }
    const csv=document.getElementById(csvId)?.value||'';
    return csv.split('\n').filter(l=>l.trim()).map(line=>{ const [code,qty,price]=line.split(','); return {code:code?.trim(),qty:parseFloat(qty)||1,price:parseFloat(price)||0}; }).filter(i=>i.code&&getItemByCode(i.code));
  },

  runCompare() {
    const ar=this.lang==='ar';
    const itemsA=this._getCmpItems('cmp-sel-A','cmp-csv-A');
    const itemsB=this._getCmpItems('cmp-sel-B','cmp-csv-B');
    const lA=document.getElementById('cmp-lbl-A')?.value||'A';
    const lB=document.getElementById('cmp-lbl-B')?.value||'B';
    if(!itemsA.length||!itemsB.length){ toast(ar?'أدخل بيانات المقايستين':'Enter data for both BOQs','warning'); return; }

    const mA=Object.fromEntries(itemsA.map(i=>[i.code,i]));
    const mB=Object.fromEntries(itemsB.map(i=>[i.code,i]));
    const codes=[...new Set([...Object.keys(mA),...Object.keys(mB)])];
    let tA=0,tB=0,same=0,up=0,dn=0,onlyA=0,onlyB=0;
    let rows='';

    codes.forEach(code=>{
      const a=mA[code],b=mB[code];
      const p=getItemByCode(code);
      const aT=a?a.price*a.qty:0, bT=b?b.price*b.qty:0;
      tA+=aT; tB+=bT;
      const diff=bT-aT;
      const pct=aT?((diff/aT)*100).toFixed(1):'—';
      let status='';
      if(!a){onlyB++;status=`<span class="badge badge-info">${ar?'جديد في ب':'New in B'}</span>`;}
      else if(!b){onlyA++;status=`<span class="badge badge-medium">${ar?'في أ فقط':'Only in A'}</span>`;}
      else if(diff>0.01){up++;status=`<span class="price-up">🔺 +${pct}%</span>`;}
      else if(diff<-0.01){dn++;status=`<span class="price-down">🔻 ${pct}%</span>`;}
      else{same++;status=`<span class="badge badge-ok">✅</span>`;}
      rows+=`<tr>
        <td class="td-code">${code}</td>
        <td class="td-desc"><div class="td-desc-ar">${p?.arDesc||'—'}</div></td>
        <td>${p?.uom||''}</td>
        <td>${a?`${a.qty}×${fmtNum(a.price)}`:'—'}</td>
        <td>${b?`${b.qty}×${fmtNum(b.price)}`:'—'}</td>
        <td class="td-total ${diff>0.01?'price-up':diff<-0.01?'price-down':''}">${aT?fmtNum(aT):'—'}</td>
        <td class="td-total ${diff>0.01?'price-up':diff<-0.01?'price-down':''}">${bT?fmtNum(bT):'—'}</td>
        <td>${status}</td>
      </tr>`;
    });

    const nd=tB-tA;
    document.getElementById('compare-result').innerHTML=`
      <div class="card">
        <div class="card-head"><span>⚖️</span><span class="card-title">${ar?'تقرير المقارنة':'Comparison Report'}: ${lA} ${ar?'مقابل':'vs'} ${lB}</span></div>
        <div class="card-body">
          <div class="grid-4 mb-16">
            <div style="text-align:center;"><div style="font-size:10.5px;color:var(--text-muted);">${ar?'مطابق':'Same'}</div><div style="font-size:22px;font-weight:800;color:var(--sec-primary);">${same}</div></div>
            <div style="text-align:center;"><div style="font-size:10.5px;color:var(--text-muted);">${ar?'ارتفع':'Up'}</div><div style="font-size:22px;font-weight:800;color:var(--accent-red);">${up}</div></div>
            <div style="text-align:center;"><div style="font-size:10.5px;color:var(--text-muted);">${ar?'انخفض':'Down'}</div><div style="font-size:22px;font-weight:800;color:var(--sec-primary);">${dn}</div></div>
            <div style="text-align:center;"><div style="font-size:10.5px;color:var(--text-muted);">${ar?'مختلف':'Different'}</div><div style="font-size:22px;font-weight:800;color:var(--accent-gold);">${onlyA+onlyB}</div></div>
          </div>
          <div class="grid-3">
            <div style="background:var(--bg-surface);border-radius:var(--r-md);padding:14px;text-align:center;">
              <div style="font-size:10.5px;color:var(--text-muted);">${ar?'إجمالي':'Total'} ${lA}</div>
              <div style="font-size:18px;font-weight:800;color:var(--accent-gold);">${fmtNum(tA)} ${ar?'ر.س':'SAR'}</div>
            </div>
            <div style="background:var(--bg-surface);border-radius:var(--r-md);padding:14px;text-align:center;">
              <div style="font-size:10.5px;color:var(--text-muted);">${ar?'إجمالي':'Total'} ${lB}</div>
              <div style="font-size:18px;font-weight:800;color:var(--accent-blue);">${fmtNum(tB)} ${ar?'ر.س':'SAR'}</div>
            </div>
            <div style="background:var(--bg-surface);border-radius:var(--r-md);padding:14px;text-align:center;border:1px solid ${nd>0?'rgba(255,77,106,0.3)':'rgba(0,132,61,0.3)'};">
              <div style="font-size:10.5px;color:var(--text-muted);">${ar?'صافي الفارق':'Net Difference'}</div>
              <div style="font-size:18px;font-weight:800;color:${nd>0?'var(--accent-red)':'var(--sec-primary)'};">${nd>0?'+':''}${fmtNum(nd)} ${ar?'ر.س':'SAR'}</div>
            </div>
          </div>
        </div>
        <div class="tbl-wrap"><table class="data-table"><thead><tr>
          <th>${ar?'الرمز':'Code'}</th><th>${ar?'الوصف':'Desc'}</th><th>${ar?'وحدة':'UOM'}</th>
          <th>${lA}</th><th>${lB}</th><th>${ar?'إجمالي أ':'Total A'}</th><th>${ar?'إجمالي ب':'Total B'}</th><th>${ar?'الحالة':'Status'}</th>
        </tr></thead><tbody>${rows}</tbody></table></div>
      </div>`;
  },

  // ────────────────────────────────────────────────
  // CERTIFICATE
  // ────────────────────────────────────────────────
  renderCertificate(c) {
    const ar=this.lang==='ar';
    const savedOpts=this.state.savedBOQs.map(b=>`<option value="${b.id}">${b.meta.wo||b.id} — ${b.meta.project||''}</option>`).join('');
    c.innerHTML=`
      <div class="grid-2 mb-16" style="align-items:start;">
        <div class="card">
          <div class="card-head"><span>⚙️</span><span class="card-title">${ar?'بيانات المستخلص':'Certificate Data'}</span></div>
          <div class="card-body">
            <div class="form-group"><label class="form-label">${ar?'رقم المستخلص':'Cert. No.'}</label><input class="form-control" id="cert-num" type="number" value="1" min="1"></div>
            <div class="form-group"><label class="form-label">${ar?'رقم أمر العمل':'Work Order No.'}</label><input class="form-control" id="cert-wo" placeholder="${ar?'مثال: 251178040-802':'e.g. 251178040-802'}"></div>
            <div class="form-group"><label class="form-label">${ar?'التاريخ':'Date'}</label><input class="form-control" type="date" id="cert-date" value="${new Date().toISOString().slice(0,10)}"></div>
            <div class="form-group"><label class="form-label">${ar?'اختر مقايسة محفوظة':'Select Saved BOQ'}</label>
              <select class="form-control" id="cert-boq" onchange="App.loadCertBOQ()"><option value="">— ${ar?'اختر':'Select'} —</option>${savedOpts}</select>
            </div>
            <div class="form-group"><label class="form-label">${ar?'نسبة إنجاز إجمالية %':'Global Completion %'}</label>
              <input class="form-control" id="cert-gpct" type="number" min="0" max="100" placeholder="${ar?'أو ادخل لكل بند':'Or enter per item'}" oninput="App.applyCertPct(this.value)">
            </div>
          </div>
        </div>
        <div id="cert-items-panel">
          <!-- Voice Assistant Slot inside Certificate Page -->
          <div id="cert-voice-card-slot" style="margin-bottom: 16px;"></div>

          <div class="card"><div class="card-body">
            <div class="empty-state" style="padding:40px 10px;"><div class="empty-icon">📜</div><p>${ar?'اختر مقايسة لبدء إنشاء المستخلص':'Select a BOQ to start'}</p></div>

        </div>
      </div>

    `;
    this._certItems=[];
    if (typeof VoiceAssistant !== 'undefined') {
      VoiceAssistant.renderVoiceCard('cert-voice-card-slot', 'cert');
    }
    this._restoreCertSession();
  },

  loadCertBOQ() {
    const id=document.getElementById('cert-boq')?.value;
    if(!id) return;
    const boq=this.state.savedBOQs.find(b=>b.id===id);
    if(!boq) return;
    const ar=this.lang==='ar';
    document.getElementById('cert-wo').value=boq.meta.wo||'';
    this._certItems=boq.items.map(i=>{ const p=getItemByCode(i.code); return {...i,unitPrice:i.customPrice||(p?p.newPrice:0),pct:0}; });
    this._renderCertItems();
    this._saveCertSession();
  },

  addVoiceItemsToCert(items) {
    const ar = this.lang === 'ar';
    const isEmerg = this.page === 'emergency_boq';
    const mult = isEmerg ? 1.9 : 1.0;

    if (!this._certItems) {
      this._certItems = [];
    }

    const newItems = items.map(itm => {
      const p = getItemByCode(itm.code);
      const unitPrice = Math.round((itm.customPrice || p?.newPrice || 0) * mult);
      return {
        code: itm.code,
        qty: itm.qty || 1,
        unitPrice: unitPrice,
        pct: 100,
        note: ar ? '🎙️ مساعد صوتي' : '🎙️ Voice Assistant'
      };
    });

    this._certItems = [...this._certItems, ...newItems];
    this._renderCertItems();
    this.genCertPreview();
    this._saveCertSession();

    const woInput = document.getElementById('cert-wo');
    if (woInput && !woInput.value) {
      woInput.value = ar ? 'مستخلص صوتي ذكي' : 'Voice AI WO';
    }
  },

  _saveCertSession() {
    try {
      if (this._certItems && this._certItems.length > 0) {
        localStorage.setItem('cert_session_cache', JSON.stringify({
          items: this._certItems,
          wo: document.getElementById('cert-wo')?.value || '',
          num: document.getElementById('cert-num')?.value || '1',
          date: document.getElementById('cert-date')?.value || '',
          gpct: document.getElementById('cert-gpct')?.value || '',
          savedAt: new Date().toISOString()
        }));
      } else {
        localStorage.removeItem('cert_session_cache');
      }
    } catch (e) {}
  },

  _restoreCertSession() {
    try {
      const raw = localStorage.getItem('cert_session_cache');
      if (!raw) return;
      const session = JSON.parse(raw);
      if (!session || !session.items || session.items.length === 0) return;
      this._certItems = session.items;
      setTimeout(() => {
        const woInput = document.getElementById('cert-wo');
        if (woInput) woInput.value = session.wo || '';
        const numInput = document.getElementById('cert-num');
        if (numInput) numInput.value = session.num || '1';
        const dateInput = document.getElementById('cert-date');
        if (dateInput) dateInput.value = session.date || '';
        const gpctInput = document.getElementById('cert-gpct');
        if (gpctInput) gpctInput.value = session.gpct || '';
        this._renderCertItems();
        this.genCertPreview();
      }, 100);
    } catch (e) {}
  },

  _renderCertItems() {
    const ar=this.lang==='ar';
    const panel=document.getElementById('cert-items-panel');
    if(!panel||!this._certItems.length) return;
    panel.innerHTML=`
      <div class="card">
        <div class="card-head"><span>📋</span><span class="card-title">${ar?'تفاصيل البنود':'Item Details'}</span></div>
        <div class="tbl-wrap"><table class="data-table"><thead><tr>
          <th>${ar?'الرمز':'Code'}</th><th>${ar?'الوصف':'Desc'}</th><th>${ar?'وحدة':'UOM'}</th>
          <th>${ar?'الكمية':'Qty'}</th><th>${ar?'السعر':'Price'}</th><th>${ar?'الإجمالي':'Total'}</th><th>${ar?'الإنجاز %':'Done %'}</th><th>${ar?'المنفذ':'Executed'}</th>
        </tr></thead><tbody>
          ${this._certItems.map((itm,idx)=>{
            const p=getItemByCode(itm.code);
            const total=itm.unitPrice*itm.qty;
            const exec=total*(itm.pct/100);
            return `<tr>
              <td class="td-code">${itm.code}</td>
              <td class="td-desc"><div class="td-desc-ar">${p?.arDesc||'—'}</div></td>
              <td><span class="uom-tag">${p?.uom||''}</span></td>
              <td>${itm.qty}</td>
              <td class="td-price">${fmtNum(itm.unitPrice)}</td>
              <td>${fmtNum(total)}</td>
              <td><input type="number" min="0" max="100" value="${itm.pct}" class="qty-cell-input" oninput="App.updateCertPct(${idx},this.value)" style="width:60px;"> %</td>
              <td class="td-total" id="cert-exec-${idx}">${fmtNum(exec)}</td>
            </tr>`;
          }).join('')}
        </tbody></table></div>
        <div style="padding:14px;display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn btn-primary" onclick="App.genCertPreview()">${ar?'📜 عرض المستخلص':'📜 Preview Certificate'}</button>
          <button class="btn btn-outline" onclick="App.printCert()">${ar?'🖨️ طباعة':'🖨️ Print'}</button>
        </div>
      </div>`;
  },

  applyCertPct(v) {
    const pct=parseFloat(v)||0;
    this._certItems.forEach((itm,idx)=>{
      itm.pct=pct;
      const el=document.getElementById(`cert-exec-${idx}`);
      if(el) el.textContent=fmtNum(Math.round(itm.unitPrice*itm.qty*pct/100));
    });
    document.querySelectorAll('#cert-items-panel input[type=number]').forEach(inp=>{ if(inp.id!=='cert-gpct') inp.value=pct; });
    this._saveCertSession();
  },

  updateCertPct(idx,v) {
    this._certItems[idx].pct=parseFloat(v)||0;
    const el=document.getElementById(`cert-exec-${idx}`);
    if(el) el.textContent=fmtNum(Math.round(this._certItems[idx].unitPrice*this._certItems[idx].qty*this._certItems[idx].pct/100));
    this._saveCertSession();
  },

            </tr></thead><tbody>
              ${this._certItems.map((itm,i)=>{

  renderPriceList(c) {
    const ar=this.lang==='ar';

        <div class="search-wrap mb-12">
          <span class="search-icon">🔍</span>
          <input class="form-control search-input" id="pl-q" style="font-size:14px;padding:12px 42px 12px 14px;" placeholder="${ar?'بحث في قائمة الأسعار الكاملة...':'Search full price list...'}" oninput="App._plSearch(this.value)">
        </div>
        <div class="cat-chips">
          ${CATEGORIES.map(cat=>`<button class="chip${cat.id==='all'?' active':''}" data-cat="${cat.id}" onclick="App._plCat('${cat.id}',this)">${cat.label}</button>`).join('')}
        </div>
      </div></div>
      <div id="pl-results"></div>`;
    this._plCatActive='all'; this._plQ='';
    this._renderPL(PRICE_LIST);
  },

  _plCat(cat,btn) { this._plCatActive=cat; document.querySelectorAll('.cat-chips .chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat)); this._applyPL(); },
  _plSearch(q) { this._plQ=q; this._applyPL(); },
  _applyPL() {
    let items=searchItems(this._plQ);
    if(this._plCatActive!=='all') items=items.filter(i=>i.cat===this._plCatActive);
    this._renderPL(items);
  },

  _renderPL(items) {
    const c=document.getElementById('pl-results');
    if(!c) return;
    const ar=this.lang==='ar';
    if(!items.length){ c.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>${ar?'لا توجد نتائج':'No results'}</p></div>`; return; }
    const grouped={};
    items.forEach(i=>{ if(!grouped[i.section]) grouped[i.section]=[]; grouped[i.section].push(i); });
    c.innerHTML=Object.entries(grouped).map(([sec,si])=>`
      <div class="card mb-16">
        <div class="card-head"><span>📁</span><span class="card-title">${sec}</span><span style="font-size:11px;color:var(--text-muted);margin-${ar?'right':'left'}:auto;">${si.length} ${ar?'بند':'items'}</span></div>
        <div class="tbl-wrap"><table class="data-table"><thead><tr>
          <th>${ar?'الرمز':'Code'}</th><th>${ar?'الوصف العربي':'Arabic Desc'}</th><th>${ar?'الوصف الإنجليزي':'English Desc'}</th>
          <th>${ar?'وحدة':'UOM'}</th><th>${ar?'السعر الموحد':'Unified Price'}</th><th></th>
        </tr></thead><tbody>
          ${si.map(item=>{
            return `<tr>
              <td class="td-code">${item.code}</td>
              <td class="td-desc"><div class="td-desc-ar">${item.arDesc}</div></td>
              <td style="font-size:11px;color:var(--text-sub);">${item.enDesc}</td>
              <td><span class="uom-tag">${item.uom}</span></td>
              <td class="td-price">${fmtNum(item.newPrice)} <span style="font-size:9.5px;color:var(--text-muted);">${ar?'ر.س':'SAR'}</span></td>
              <td><button class="btn btn-primary btn-sm btn-icon" onclick="App._addFromSearch('${item.code}')" title="${ar?'إضافة للمقايسة':'Add to BOQ'}">➕</button></td>
            </tr>`;
          }).join('')}
        </tbody></table></div>
      </div>
    `).join('');
  },
